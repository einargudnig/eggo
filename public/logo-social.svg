<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Subtle radial gradient for depth -->
    <radialGradient id="bg-gradient" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0a0a0a"/>
  <rect width="1080" height="1080" fill="url(#bg-gradient)"/>

  <!-- "e" lettermark - optically centered for circle crop -->
  <text
    x="500"
    y="640"
    font-family="'DM Sans', 'Inter', system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="540"
    fill="#f5f5f4"
    letter-spacing="-10"
  >e</text>

  <!-- Gold accent dot - positioned as tittle/period accent -->
  <circle cx="740" cy="300" r="64" fill="#d4a054"/>
</svg>
